<!DOCTYPE html>
<html>
<head>

<title>Customer Drop-Off Prediction</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

header{
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
}

.container{
width:60%;
margin:auto;
margin-top:40px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 5px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:30px;
}

label{
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:20px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#3498db;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

.result-box{
margin-top:30px;
padding:20px;
background:#ecf0f1;
border-radius:8px;
}

.alert{
margin-top:15px;
padding:15px;
border-radius:6px;
font-weight:bold;
}

.safe{
background:#2ecc71;
color:white;
}

.warning{
background:#f39c12;
color:white;
}

.danger{
background:#e74c3c;
color:white;
}

footer{
text-align:center;
margin-top:30px;
color:#777;
}

</style>

</head>

<body>

<header>
<h1>Customer Drop-Off Prediction System</h1>
<p>Edge–Fog Behavioral Analytics Dashboard</p>
</header>

<div class="container">

<h2>User Interaction Simulation</h2>

<label>Session Time (minutes)</label>
<input id="session">

<label>Pages Viewed</label>
<input id="pages">

<label>Scroll Depth (%)</label>
<input id="scroll">

<label>Idle Time (seconds)</label>
<input id="idle">

<button onclick="predict()">Predict Drop-Off Risk</button>

<div class="result-box">

<h3>Prediction Result</h3>

<p id="probability">Churn Probability: --</p>

<div id="action"></div>

</div>

</div>

<footer>
<p>Predictive Analytics | Fog Computing | Secure Behavioral Processing</p>
</footer>

<script>

async function predict(){

let data={
session_time:document.getElementById("session").value,
pages_viewed:document.getElementById("pages").value,
scroll_depth:document.getElementById("scroll").value,
idle_time:document.getElementById("idle").value
}

let response=await fetch("/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

let result=await response.json()

let prob=result.churn_probability

document.getElementById("probability").innerText=
"Churn Probability: "+prob.toFixed(2)

let action=document.getElementById("action")

if(prob<0.3){
action.innerHTML="<div class='alert safe'>User engagement healthy. No action needed.</div>"
}
else if(prob<0.6){
action.innerHTML="<div class='alert warning'>User may disengage. Recommend product or assistance.</div>"
}
else{
action.innerHTML="<div class='alert danger'>High drop-off risk! Trigger discount or chatbot support.</div>"
}

}

</script>

</body>
</html>
